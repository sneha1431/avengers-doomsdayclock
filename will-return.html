  <style>
    .wr-page { max-width: 780px; margin: 0 auto; padding: 64px 24px 80px; }
    .wr-header { text-align: center; margin-bottom: 40px; }
    .wr-header .eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--red); margin-bottom: 12px; }

    #wr-canvas { width: 100%; max-width: 640px; aspect-ratio: 16/9; display: block; cursor: pointer; border: 1px solid var(--border); }
    .canvas-hint { text-align: center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }

<body>
<div class="page">
  <main class="wr-page">
    <div class="wr-header">
      <div class="eyebrow">Marvel Studios Fan Tool</div>
      <h1>Will Return<br>Generator</h1>
      <p>Cinematic animated reveal — just like the real Doomsday trailers. Export as MP4 video or PNG.</p>
    </div>

    <div class="canvas-wrap">
      <canvas id="wr-canvas" width="640" height="360"></canvas>
    </div>
    <div class="canvas-hint">Click preview to replay · Export MP4 to share on socials</div>

    <div class="wr-controls">
      <div class="wr-field">
        <label>Character or Name</label>
        <input type="text" id="wr-name" placeholder="e.g. Tony Stark" maxlength="40" value="Tony Stark">
      </div>
      <div class="wr-row">
        <div class="wr-field">
          <label>Prefix</label>
          <select id="wr-prefix">
            <option value="will return in">will return in</option>
            <option value="will not return in">will not return in</option>
            <option value="will definitely return in">will definitely return in</option>
            <option value="may or may not return in">may or may not return in</option>
            <option value="has always been in">has always been in</option>
            <option value="demands to be in">demands to be in</option>
          </select>
        </div>
        <div class="wr-field">
          <label>Movie</label>
          <select id="wr-movie">
            <option value="Avengers: Doomsday">Avengers: Doomsday</option>
            <option value="Avengers: Secret Wars">Avengers: Secret Wars</option>
            <option value="the MCU">the MCU</option>
            <option value="your nightmares">your nightmares</option>
          </select>
        </div>
      </div>

      <div class="wr-actions">
        <button class="btn btn-red" id="play-btn" onclick="playAnimation()">▶ Play</button>
        <button class="btn btn-outline" id="mp4-btn" onclick="exportMp4()">Export MP4</button>
        <button class="btn btn-outline" onclick="downloadPng()">Download PNG</button>
        <button class="btn btn-outline" onclick="shareCard()">Share</button>
      </div>
      <div class="export-status" id="export-status"></div>
      <div class="compat-note" id="compat-note"></div>
    </div>

    <div class="suggestions">
      <div class="suggestions-label">Quick picks</div>
      <div class="suggestions-grid" id="suggestions"></div>
    </div>
  </main>
</div>

<script src="shared.js"></script>
<script>
injectNav('will-return.html');
injectFooter();
injectParticles(20);

const SUGGESTIONS = [
  'Tony Stark','Steve Rogers','Thor','Black Widow','Gamora',
  'Loki','Vision','Doctor Strange','Spider-Man','Your Dog',
  'The Chairs','Thanos (again)','Your Monday Mood','Deadpool'
];

const canvas = document.getElementById('wr-canvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 360;

// timing ms
const T = {
  bgFade:      400,
  nameStart:   700,
  nameDone:   1500,
  prefStart:  1700,
  prefDone:   2200,
  movStart:   2300,
  movDone:    3100,
  lineStart:  3100,
  lineDone:   3600,
  badgeStart: 3700,
  hold:       5200,
};

let animId = null, startTime = null;

const getName   = () => document.getElementById('wr-name').value.trim() || 'Your Name';
const getPrefix = () => document.getElementById('wr-prefix').value;
const getMovie  = () => document.getElementById('wr-movie').value;

const easeOut = t => 1 - Math.pow(1 - t, 3);
const clamp   = (v, a, b) => Math.max(a, Math.min(b, v));
const prog    = (e, s, d) => easeOut(clamp((e - s) / (d - s), 0, 1));

function drawFrame(elapsed) {
  ctx.clearRect(0, 0, W, H);

  // black bg
  const bgA = clamp(elapsed / T.bgFade, 0, 1);
  ctx.fillStyle = '#000';
  ctx.globalAlpha = bgA;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // subtle red grid
  ctx.strokeStyle = `rgba(226,54,54,${bgA * 0.04})`;
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const cx = W / 2;

  // NAME
  const np = prog(elapsed, T.nameStart, T.nameDone);
  if (np > 0) {
    ctx.save();
    ctx.globalAlpha = np;
    ctx.translate(0, (1 - np) * 20);
    ctx.font = 'bold 64px "Bebas Neue", Arial, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const name = getName().toUpperCase();
    const mw = ctx.measureText(name).width;
    if (mw > W - 80) ctx.scale((W - 80) / mw, 1);
    ctx.fillText(name, cx, H * 0.415);
    ctx.restore();
  }

  // PREFIX
  const pp = prog(elapsed, T.prefStart, T.prefDone);
  if (pp > 0) {
    ctx.save();
    ctx.globalAlpha = pp;
    ctx.translate(0, (1 - pp) * 10);
    ctx.font = '400 16px "DM Sans", Arial, sans-serif';
    ctx.fillStyle = '#999';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(getPrefix().toUpperCase(), cx, H * 0.578);
    ctx.restore();
  }

  // MOVIE TITLE
  const mp = prog(elapsed, T.movStart, T.movDone);
  if (mp > 0) {
    ctx.save();
    ctx.globalAlpha = mp;
    ctx.translate(0, (1 - mp) * 12);
    ctx.font = 'bold 36px "Bebas Neue", Arial, sans-serif';
    ctx.fillStyle = '#e23636';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(getMovie().toUpperCase(), cx, H * 0.695);
    ctx.restore();
  }

  // UNDERLINE
  const lp = prog(elapsed, T.lineStart, T.lineDone);
  if (lp > 0 && mp > 0) {
    ctx.save();
    ctx.font = 'bold 36px "Bebas Neue", Arial, sans-serif';
    const mw2 = ctx.measureText(getMovie().toUpperCase()).width;
    ctx.strokeStyle = '#e23636';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = mp;
    ctx.beginPath();
    ctx.moveTo(cx - mw2 / 2, H * 0.727);
    ctx.lineTo(cx - mw2 / 2 + mw2 * lp, H * 0.727);
    ctx.stroke();
    ctx.restore();
  }

  // BADGE
  const bp = prog(elapsed, T.badgeStart, T.badgeStart + 600);
  if (bp > 0) {
    ctx.save();
    ctx.globalAlpha = bp * 0.28;
    ctx.font = '400 10px "DM Sans", Arial, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FAN-MADE  ·  NOT AFFILIATED WITH MARVEL STUDIOS  ·  AVENGERS-DOOMSDAYCLOCK.PAGES.DEV', cx, H * 0.91);
    ctx.restore();
  }

  // vignette
  const vg = ctx.createRadialGradient(cx, H/2, H * 0.12, cx, H/2, H * 0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, `rgba(0,0,0,${bgA * 0.6})`);
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function playAnimation(onDone) {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  startTime = null;
  function loop(ts) {
    if (!startTime) startTime = ts;
    const e = ts - startTime;
    drawFrame(e);
    if (e < T.hold) {
      animId = requestAnimationFrame(loop);
    } else {
      drawFrame(T.hold);
      animId = null;
      if (onDone) onDone();
    }
  }
  animId = requestAnimationFrame(loop);
}

function downloadPng() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  drawFrame(T.hold);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = (getName().toLowerCase().replace(/\s+/g,'-') || 'will-return') + '.png';
  a.click();
}

function exportMp4() {
  const statusEl = document.getElementById('export-status');
  const btn = document.getElementById('mp4-btn');

  // check support
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9'
    : MediaRecorder.isTypeSupported('video/webm')
    ? 'video/webm'
    : null;

  if (!mimeType) {
    statusEl.textContent = 'Your browser does not support video export. Try Chrome or Edge.';
    return;
  }

  btn.textContent = 'Recording...';
  btn.disabled = true;
  statusEl.textContent = 'Recording animation...';

  const chunks = [];
  const stream = canvas.captureStream(60);
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 4000000 });

  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: mimeType });
    const ext = mimeType.includes('webm') ? 'webm' : 'mp4';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (getName().toLowerCase().replace(/\s+/g,'-') || 'will-return') + '.' + ext;
    a.click();
    URL.revokeObjectURL(url);

    btn.textContent = 'Export MP4';
    btn.disabled = false;
    statusEl.textContent = 'Download started! (WebM plays on all devices, rename to .mp4 if needed)';
    setTimeout(() => { statusEl.textContent = ''; }, 5000);

    // replay after export
    playAnimation();
  };

  recorder.start();

  // play animation while recording
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  startTime = null;

  function loop(ts) {
    if (!startTime) startTime = ts;
    const e = ts - startTime;
    drawFrame(e);
    if (e < T.hold) {
      animId = requestAnimationFrame(loop);
    } else {
      drawFrame(T.hold);
      animId = null;
      // hold 3 extra frames then stop
      setTimeout(() => recorder.stop(), 200);
    }
  }
  animId = requestAnimationFrame(loop);
}

function shareCard() {
  const text = `${getName()} ${getPrefix()} ${getMovie()} 🎬 #AvengersDoomsday`;
  if (navigator.share) { navigator.share({ title: 'Will Return Generator', text }); }
  else { navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!')); }
}

// check MediaRecorder support on load
window.addEventListener('load', () => {
  const note = document.getElementById('compat-note');
  if (typeof MediaRecorder === 'undefined') {
    note.textContent = 'Video export not supported in this browser. Use Chrome, Edge, or Firefox for MP4 export.';
    document.getElementById('mp4-btn').disabled = true;
  }
  setTimeout(playAnimation, 500);
});

// suggestions
const grid = document.getElementById('suggestions');
SUGGESTIONS.forEach(s => {
  const pill = document.createElement('button');
  pill.className = 'suggestion-pill';
  pill.textContent = s;
  pill.onclick = () => { document.getElementById('wr-name').value = s; playAnimation(); };
  grid.appendChild(pill);
});

canvas.addEventListener('click', () => playAnimation());
</script>
</body>
</html>
