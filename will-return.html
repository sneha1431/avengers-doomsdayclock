<body>
<div class="page">
  <main class="wr-page">
    <div class="wr-header">
      <div class="eyebrow">Marvel Studios Fan Tool</div>
      <h1>Will Return<br>Generator</h1>
      <p>Cinematic animated reveal — just like the real Doomsday trailers. Download as GIF or PNG.</p>
    </div>

    <div class="canvas-wrap">
      <canvas id="wr-canvas" width="640" height="360"></canvas>
    </div>
    <div class="canvas-hint">Click the preview to replay · Download GIF to share</div>

    <div class="wr-controls">
      <div class="wr-field">
        <label>Character or Name</label>
        <input type="text" id="wr-name" placeholder="e.g. Tony Stark" maxlength="40" value="Tony Stark">
      </div>
      <div class="wr-row">
        <div class="wr-field">
          <label>Prefix</label>
          <select id="wr-prefix">
            <option value="will return in">will return in</option>
            <option value="will not return in">will not return in</option>
            <option value="will definitely return in">will definitely return in</option>
            <option value="may or may not return in">may or may not return in</option>
            <option value="has always been in">has always been in</option>
            <option value="demands to be in">demands to be in</option>
          </select>
        </div>
        <div class="wr-field">
          <label>Movie</label>
          <select id="wr-movie">
            <option value="Avengers: Doomsday">Avengers: Doomsday</option>
            <option value="Avengers: Secret Wars">Avengers: Secret Wars</option>
            <option value="the MCU">the MCU</option>
            <option value="your nightmares">your nightmares</option>
          </select>
        </div>
      </div>
      <div class="wr-actions">
        <button class="btn btn-red" onclick="playAnimation()">▶ Play Animation</button>
        <button class="btn btn-outline" id="gif-btn" onclick="downloadGif()">Download GIF</button>
        <button class="btn btn-outline" onclick="downloadPng()">Download PNG</button>
        <button class="btn btn-outline" onclick="shareCard()">Share</button>
      </div>
      <div class="gif-progress" id="gif-progress"><div class="gif-progress-bar" id="gif-bar"></div></div>
      <div class="gif-status" id="gif-status"></div>
    </div>

    <div class="suggestions">
      <div class="suggestions-label">Quick picks</div>
      <div class="suggestions-grid" id="suggestions"></div>
    </div>
  </main>
</div>

<script src="shared.js"></script>
<script>
injectNav('will-return.html');
injectFooter();
injectParticles(20);

const SUGGESTIONS = [
  'Tony Stark','Steve Rogers','Thor','Black Widow','Gamora',
  'Loki','Vision','Doctor Strange','Spider-Man','Your Dog',
  'The Chairs','Thanos (again)','Your Monday Mood','Deadpool'
];

const canvas = document.getElementById('wr-canvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 360;

const T = {
  fadeInBg:    400,
  nameStart:   700,
  nameDone:   1400,
  prefixStart:1600,
  prefixDone: 2100,
  movieStart: 2200,
  movieDone:  3000,
  lineStart:  3000,
  lineDone:   3500,
  hold:       4800,
};

let animId = null;
let startTime = null;

function getName()   { return document.getElementById('wr-name').value.trim() || 'Your Name'; }
function getPrefix() { return document.getElementById('wr-prefix').value; }
function getMovie()  { return document.getElementById('wr-movie').value; }

function easeOut(t) { return 1 - Math.pow(1-t, 3); }
function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function prog(elapsed, start, end) { return easeOut(clamp01((elapsed - start) / (end - start))); }

function drawFrame(elapsed) {
  ctx.clearRect(0, 0, W, H);

  // background
  const bgA = clamp01(elapsed / T.fadeInBg);
  ctx.fillStyle = '#000';
  ctx.globalAlpha = bgA;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // grid
  ctx.strokeStyle = `rgba(226,54,54,${bgA * 0.035})`;
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const cx = W / 2;

  // NAME
  const nameP = prog(elapsed, T.nameStart, T.nameDone);
  if (nameP > 0) {
    ctx.save();
    ctx.globalAlpha = nameP;
    ctx.translate(0, (1 - nameP) * 18);
    ctx.font = 'bold 64px "Bebas Neue", sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const name = getName().toUpperCase();
    const mw = ctx.measureText(name).width;
    const maxW = W - 80;
    if (mw > maxW) ctx.scale(maxW / mw, 1);
    ctx.fillText(name, cx, H * 0.415);
    ctx.restore();
  }

  // PREFIX
  const prefP = prog(elapsed, T.prefixStart, T.prefixDone);
  if (prefP > 0) {
    ctx.save();
    ctx.globalAlpha = prefP;
    ctx.translate(0, (1 - prefP) * 10);
    ctx.font = '400 17px "DM Sans", sans-serif';
    ctx.fillStyle = '#999';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(getPrefix().toUpperCase(), cx, H * 0.575);
    ctx.restore();
  }

  // MOVIE
  const movP = prog(elapsed, T.movieStart, T.movieDone);
  if (movP > 0) {
    ctx.save();
    ctx.globalAlpha = movP;
    ctx.translate(0, (1 - movP) * 12);
    ctx.font = 'bold 34px "Bebas Neue", sans-serif';
    ctx.fillStyle = '#e23636';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '3px';
    ctx.fillText(getMovie().toUpperCase(), cx, H * 0.695);
    ctx.restore();
  }

  // RED UNDERLINE
  const lineP = prog(elapsed, T.lineStart, T.lineDone);
  if (lineP > 0) {
    ctx.save();
    ctx.font = 'bold 34px "Bebas Neue", sans-serif';
    const mw2 = ctx.measureText(getMovie().toUpperCase()).width;
    const lx = cx - mw2 / 2;
    const ly = H * 0.725;
    ctx.strokeStyle = '#e23636';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = movP;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx + mw2 * lineP, ly);
    ctx.stroke();
    ctx.restore();
  }

  // BADGE
  const badgeP = clamp01((elapsed - T.lineDone) / 500);
  if (badgeP > 0) {
    ctx.save();
    ctx.globalAlpha = badgeP * 0.3;
    ctx.font = '400 10px "DM Sans", sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FAN-MADE  ·  NOT AFFILIATED WITH MARVEL STUDIOS', cx, H * 0.905);
    ctx.restore();
  }

  // vignette
  const vg = ctx.createRadialGradient(cx, H/2, H*0.15, cx, H/2, H*0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, `rgba(0,0,0,${bgA * 0.65})`);
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function playAnimation(onDone) {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  startTime = null;
  function loop(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    drawFrame(elapsed);
    if (elapsed < T.hold) {
      animId = requestAnimationFrame(loop);
    } else {
      drawFrame(T.hold);
      animId = null;
      if (onDone) onDone();
    }
  }
  animId = requestAnimationFrame(loop);
}

function downloadPng() {
  drawFrame(T.hold);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = (getName().toLowerCase().replace(/\s+/g,'-') || 'will-return') + '.png';
  a.click();
}

function downloadGif() {
  const btn = document.getElementById('gif-btn');
  const prog2 = document.getElementById('gif-progress');
  const bar = document.getElementById('gif-bar');
  const status = document.getElementById('gif-status');

  btn.textContent = 'Loading...';
  btn.disabled = true;

  function loadScript(src, cb) {
    if (document.querySelector(`script[src="${src}"]`)) { cb(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = cb; document.head.appendChild(s);
  }

  loadScript('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js', () => {
    btn.textContent = 'Generating...';
    prog2.style.display = 'block';
    status.style.display = 'block';
    status.textContent = 'Capturing frames...';

    const fps = 24;
    const totalFrames = Math.floor(T.hold / 1000 * fps);
    const delay = Math.round(1000 / fps);

    const gif = new GIF({
      workers: 2, quality: 8,
      width: W, height: H,
      workerScript: 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js',
    });

    for (let i = 0; i <= totalFrames; i++) {
      drawFrame((i / totalFrames) * T.hold);
      gif.addFrame(ctx, { copy: true, delay });
      bar.style.width = (i / totalFrames * 50) + '%';
    }

    status.textContent = 'Encoding GIF...';

    gif.on('progress', p => { bar.style.width = (50 + p * 50) + '%'; });

    gif.on('finished', blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (getName().toLowerCase().replace(/\s+/g,'-') || 'will-return') + '.gif';
      a.click();
      URL.revokeObjectURL(url);
      prog2.style.display = 'none';
      status.style.display = 'none';
      bar.style.width = '0%';
      btn.textContent = 'Download GIF';
      btn.disabled = false;
      playAnimation();
    });

    gif.render();
  });
}

function shareCard() {
  const text = `${getName()} ${getPrefix()} ${getMovie()} 🎬 #AvengersDoomsday`;
  if (navigator.share) { navigator.share({ title: 'Will Return Generator', text }); }
  else { navigator.clipboard.writeText(text).then(() => alert('Copied!')); }
}

// suggestions
const grid = document.getElementById('suggestions');
SUGGESTIONS.forEach(s => {
  const pill = document.createElement('button');
  pill.className = 'suggestion-pill';
  pill.textContent = s;
  pill.onclick = () => { document.getElementById('wr-name').value = s; playAnimation(); };
  grid.appendChild(pill);
});

canvas.addEventListener('click', () => playAnimation());
window.addEventListener('load', () => setTimeout(playAnimation, 500));
</script>
</body>
