<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avengers Doomsday Confirmed Cast 2026 — Every Actor and Character</title>
  <meta name="description" content="Full confirmed cast for Avengers Doomsday December 2026. Robert Downey Jr as Doctor Doom, Anthony Mackie, Pedro Pascal, Chris Hemsworth and more.">
  <meta name="keywords" content="avengers doomsday cast, avengers doomsday confirmed cast, who is in avengers doomsday, doctor doom cast, rdj doctor doom">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://avengersdoomsdayclock.pages.dev/cast.html">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://avengersdoomsdayclock.pages.dev/cast.html">
  <meta property="og:title" content="Avengers Doomsday Confirmed Cast — Every Hero and Villain">
  <meta property="og:description" content="Every confirmed actor and character for Avengers Doomsday. RDJ as Doctor Doom plus 20+ more heroes and villains.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Avengers Doomsday Confirmed Cast 2026">
  <link rel="stylesheet" href="shared.css">
  <style>
    .cast-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    .cast-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .cast-header .eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 12px;
    }

    .cast-header h1 {
      font-family: var(--bebas);
      font-size: clamp(40px, 10vw, 72px);
      letter-spacing: 2px;
      line-height: 1;
    }

    .cast-header p {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    /* FILTERS */
    .cast-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: #fff; color: #fff; }
    .filter-btn.active { border-color: var(--red); color: var(--red); background: rgba(226,54,54,0.07); }

    /* CAST GRID */
    .cast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .cast-card {
      background: var(--bg);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.15s;
    }

    .cast-card:hover { background: var(--bg3); }

    .cast-initial {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--bebas);
      font-size: 16px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .cast-character {
      font-family: var(--bebas);
      font-size: 16px;
      letter-spacing: 1px;
      color: #fff;
      line-height: 1.1;
    }

    .cast-actor {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
    }

    .cast-tag {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 2px;
      margin-top: 6px;
      align-self: flex-start;
    }

    .tag-hero { background: rgba(100,180,255,0.1); color: #5aacff; border: 1px solid rgba(100,180,255,0.2); }
    .tag-villain { background: rgba(226,54,54,0.1); color: var(--red); border: 1px solid rgba(226,54,54,0.2); }
    .tag-antihero { background: rgba(200,160,80,0.1); color: #c9a84c; border: 1px solid rgba(200,160,80,0.2); }
    .tag-new { background: rgba(80,200,120,0.1); color: #50c878; border: 1px solid rgba(80,200,120,0.2); }

    /* INITIALS COLORS */
    .ic-red { background: rgba(226,54,54,0.15); color: var(--red); }
    .ic-blue { background: rgba(90,172,255,0.15); color: #5aacff; }
    .ic-gold { background: rgba(201,168,76,0.15); color: var(--gold); }
    .ic-green { background: rgba(80,200,120,0.15); color: #50c878; }
    .ic-purple { background: rgba(160,100,220,0.15); color: #a064dc; }

    /* HIDDEN */
    .cast-card.hidden { display: none; }

    /* COUNT */
    .cast-count {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="page">
  <main class="cast-page">
    <div class="cast-header">
      <div class="eyebrow">Avengers: Doomsday · Dec 18 2026</div>
      <h1>Confirmed Cast</h1>
      <p>Every actor and character confirmed for Doomsday — 31 confirmed so far, including the full X-Men lineup.</p>
    </div>

    <div class="cast-filters" id="filters">
      <button class="filter-btn active" onclick="filter('all', this)">All</button>
      <button class="filter-btn" onclick="filter('hero', this)">Heroes</button>
      <button class="filter-btn" onclick="filter('villain', this)">Villains</button>
      <button class="filter-btn" onclick="filter('antihero', this)">Anti-Heroes</button>
      <button class="filter-btn" onclick="filter('new', this)">New to MCU</button>
    </div>

    <div class="cast-count" id="cast-count"></div>

    <div class="cast-grid" id="cast-grid"></div>
  </main>
</div>

<script src="shared.js"></script>
<script>
  injectNav('cast.html');
  injectFooter();
  injectParticles(15);

  const CAST = [
    // Villain
    { character: 'Doctor Doom', actor: 'Robert Downey Jr.', type: 'villain', color: 'ic-red' },
    // Avengers / Heroes
    { character: 'Thor', actor: 'Chris Hemsworth', type: 'hero', color: 'ic-blue' },
    { character: 'Captain America', actor: 'Anthony Mackie', type: 'hero', color: 'ic-blue' },
    { character: 'Steve Rogers', actor: 'Chris Evans', type: 'hero', color: 'ic-blue' },
    { character: 'Black Panther', actor: 'Letitia Wright', type: 'hero', color: 'ic-purple' },
    { character: 'Ant-Man', actor: 'Paul Rudd', type: 'hero', color: 'ic-green' },
    { character: 'Shang-Chi', actor: 'Simu Liu', type: 'hero', color: 'ic-green' },
    { character: 'Namor', actor: 'Tenoch Huerta', type: 'antihero', color: 'ic-blue' },
    { character: 'Sentry', actor: 'Lewis Pullman', type: 'hero', color: 'ic-gold', new: true },
    { character: 'Falcon', actor: 'Danny Ramirez', type: 'hero', color: 'ic-blue' },
    { character: 'M\'Baku', actor: 'Winston Duke', type: 'hero', color: 'ic-green' },
    { character: 'Okoye', actor: 'Danai Gurira', type: 'hero', color: 'ic-green' },
    { character: 'Wong', actor: 'Benedict Wong', type: 'hero', color: 'ic-gold' },
    { character: 'Ghost', actor: 'Hannah John-Kamen', type: 'antihero', color: 'ic-purple' },
    { character: 'Loki', actor: 'Tom Hiddleston', type: 'antihero', color: 'ic-gold' },
    { character: 'Love', actor: 'India Rose Hemsworth', type: 'hero', color: 'ic-blue' },
    // Fantastic Four
    { character: 'Mr. Fantastic', actor: 'Pedro Pascal', type: 'hero', color: 'ic-blue', new: true },
    { character: 'Invisible Woman', actor: 'Vanessa Kirby', type: 'hero', color: 'ic-blue', new: true },
    { character: 'Human Torch', actor: 'Joseph Quinn', type: 'hero', color: 'ic-red', new: true },
    { character: 'The Thing', actor: 'Ebon Moss-Bachrach', type: 'hero', color: 'ic-gold', new: true },
    // Thunderbolts
    { character: 'Yelena Belova', actor: 'Florence Pugh', type: 'antihero', color: 'ic-purple' },
    { character: 'Bucky Barnes', actor: 'Sebastian Stan', type: 'antihero', color: 'ic-blue' },
    { character: 'Red Guardian', actor: 'David Harbour', type: 'antihero', color: 'ic-red' },
    { character: 'US Agent', actor: 'Wyatt Russell', type: 'antihero', color: 'ic-blue' },
    // X-Men
    { character: 'Professor X', actor: 'Patrick Stewart', type: 'hero', color: 'ic-purple', new: true },
    { character: 'Magneto', actor: 'Ian McKellen', type: 'antihero', color: 'ic-red', new: true },
    { character: 'Beast', actor: 'Kelsey Grammer', type: 'hero', color: 'ic-blue', new: true },
    { character: 'Cyclops', actor: 'James Marsden', type: 'hero', color: 'ic-red', new: true },
    { character: 'Nightcrawler', actor: 'Alan Cumming', type: 'hero', color: 'ic-purple', new: true },
    { character: 'Gambit', actor: 'Channing Tatum', type: 'antihero', color: 'ic-gold', new: true },
    { character: 'Mystique', actor: 'Rebecca Romijn', type: 'antihero', color: 'ic-blue', new: true },
  ];

  const grid = document.getElementById('cast-grid');
  const countEl = document.getElementById('cast-count');

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).slice(0, 2).join('');
  }

  CAST.forEach(c => {
    const card = document.createElement('div');
    const types = [c.type];
    if (c.new) types.push('new');
    card.className = 'cast-card';
    card.dataset.types = types.join(' ');

    let tagHtml = `<span class="cast-tag tag-${c.type}">${c.type}</span>`;
    if (c.new) tagHtml += ` <span class="cast-tag tag-new">New</span>`;

    card.innerHTML = `
      <div class="cast-initial ${c.color}">${getInitials(c.character)}</div>
      <div class="cast-character">${c.character}</div>
      <div class="cast-actor">${c.actor}</div>
      ${tagHtml}
    `;
    grid.appendChild(card);
  });

  function updateCount() {
    const visible = document.querySelectorAll('.cast-card:not(.hidden)').length;
    countEl.textContent = `${visible} character${visible !== 1 ? 's' : ''} confirmed`;
  }

  function filter(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.cast-card').forEach(card => {
      if (type === 'all') {
        card.classList.remove('hidden');
      } else {
        const types = card.dataset.types.split(' ');
        card.classList.toggle('hidden', !types.includes(type));
      }
    });
    updateCount();
  }

  updateCount();
</script>
</body>
</html>
